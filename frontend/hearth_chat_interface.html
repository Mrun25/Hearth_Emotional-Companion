<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hearth Companion</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Color Palette: Warm, Calming Light Mode */
            --bg-base: #f1f5f9; /* Slate 100 */
            --bg-surface: rgba(255, 255, 255, 0.85);
            --bg-surface-hover: rgba(241, 245, 249, 0.9);
            
            --text-primary: #1e293b; /* Slate 800 */
            --text-secondary: #475569; /* Slate 600 */
            --text-muted: #94a3b8; /* Slate 400 */
            
            --accent-primary: #f97316; /* Orange 500 */
            --accent-gradient: linear-gradient(135deg, #f97316 0%, #facc15 100%); /* Orange to Yellow */
            
            --border-color: rgba(0, 0, 0, 0.08);
            --shadow-glow: 0 0 20px rgba(249, 115, 22, 0.1);
            
            --transition-smooth: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(249, 115, 22, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(250, 204, 21, 0.05) 0%, transparent 50%);
        }

        /* Main Chat Container - Glassmorphism effect */
        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            max-height: 800px;
            background: var(--bg-surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05), var(--shadow-glow);
            overflow: hidden;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header */
        .chat-header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--accent-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            font-size: 1.2rem;
            color: white;
            box-shadow: 0 4px 12px rgba(250, 204, 21, 0.3);
            animation: pulseGlow 3s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 10px rgba(250, 204, 21, 0.2); }
            100% { box-shadow: 0 0 20px rgba(250, 204, 21, 0.5); }
        }

        .header-info h1 {
            font-size: 1.25rem;
            font-weight: 500;
            letter-spacing: -0.02em;
        }

        .header-info p {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Chat History Area */
        .chat-history {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar */
        .chat-history::-webkit-scrollbar {
            width: 6px;
        }
        .chat-history::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-history::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }
        .chat-history::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Message Bubbles */
        .message {
            max-width: 80%;
            padding: 16px 24px;
            border-radius: 20px;
            font-size: 1rem;
            line-height: 1.6;
            animation: messageSlideIn 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
        }

        @keyframes messageSlideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.assistant {
            align-self: flex-start;
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
            color: var(--text-primary);
        }

        .message.user {
            align-self: flex-end;
            background: var(--accent-gradient);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(249, 115, 22, 0.2);
        }

        .message-time {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 8px;
            display: block;
        }
        
        .message.user .message-time {
            color: rgba(255, 255, 255, 0.7);
            text-align: right;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border-color);
            padding: 16px 24px;
            border-radius: 20px;
            border-bottom-left-radius: 4px;
            align-items: center;
            gap: 6px;
        }

        .typing-indicator.active {
            display: flex;
        }

        .dot {
            width: 6px;
            height: 6px;
            background-color: var(--text-secondary);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Input Area */
        .chat-input-wrapper {
            padding: 24px 32px;
            border-top: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.6);
        }

        .input-container {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 8px 8px 8px 24px;
            transition: var(--transition-smooth);
        }

        .input-container:focus-within {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 1px var(--accent-primary), var(--shadow-glow);
            background: rgba(255, 255, 255, 1);
        }

        input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            padding: 8px 0;
        }

        input[type="text"]::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            background: var(--accent-gradient);
            border: none;
            border-radius: 12px;
            width: 44px;
            height: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: var(--transition-smooth);
            color: white;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(250, 204, 21, 0.4);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transform: translateX(-1px) translateY(1px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .chat-container {
                height: 100vh;
                max-height: 100vh;
                border-radius: 0;
                border: none;
            }
            .message {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <!-- Header -->
        <header class="chat-header">
            <div class="avatar">H</div>
            <div class="header-info">
                <h1>Hearth</h1>
                <p>Ready to listen.</p>
            </div>
        </header>

        <!-- Chat History -->
        <main class="chat-history" id="chatHistory">
            <!-- Initial Greeting -->
            <div class="message assistant">
                I'm here. What's sitting heavy on your mind today?
                <span class="message-time">Just now</span>
            </div>

            <!-- Typing Indicator (Hidden by default) -->
            <div class="typing-indicator" id="typingIndicator">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </main>

        <!-- Input Area -->
        <footer class="chat-input-wrapper">
            <form class="input-container" id="chatForm">
                <input 
                    type="text" 
                    id="userInput" 
                    placeholder="Type a message..." 
                    autocomplete="off"
                    required
                >
                <button type="submit" class="send-btn" aria-label="Send message">
                    <svg viewBox="0 0 24 24">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </footer>
    </div>

    <script>
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const chatHistory = document.getElementById('chatHistory');
        const typingIndicator = document.getElementById('typingIndicator');

        let messageHistory = [];

        // Helper to format current time
        const getCurrentTime = () => {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            minutes = minutes < 10 ? '0' + minutes : minutes;
            return `${hours}:${minutes} ${ampm}`;
        };

        // Scroll to bottom
        const scrollToBottom = () => {
            chatHistory.scrollTop = chatHistory.scrollHeight;
        };

        // Add a message to the UI
        const addMessage = (text, sender) => {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            messageDiv.innerHTML = `
                ${text}
                <span class="message-time">${getCurrentTime()}</span>
            `;
            
            // Insert before typing indicator
            chatHistory.insertBefore(messageDiv, typingIndicator);
            scrollToBottom();
        };

        // Handle form submission
        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            // 1. Add user message
            addMessage(text, 'user');
            messageHistory.push({role: "user", content: text});
            userInput.value = '';

            // 2. Show typing indicator
            typingIndicator.classList.add('active');
            scrollToBottom();

            // 3. Send message history to Backend API
            fetch('http://127.0.0.1:5000/api/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ messages: messageHistory })
            })
            .then(async res => {
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || "Network response was not ok");
                return data;
            })
            .then(data => {
                typingIndicator.classList.remove('active');
                if (data.response) {
                    addMessage(data.response, 'assistant');
                    messageHistory.push({role: "assistant", content: data.response});
                } else if (data.error) {
                    addMessage("Error: " + data.error, 'assistant');
                }
            })
            .catch(error => {
                typingIndicator.classList.remove('active');
                addMessage(error.message || "Sorry, I'm having trouble connecting right now. Make sure the backend server is running.", 'assistant');
                console.error("Error:", error);
            });
        });

        // Focus input on load
        window.addEventListener('DOMContentLoaded', () => {
            userInput.focus();
        });
    </script>
</body>
</html>
